<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mundial 2026 — Xat 2000s</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0b1530;
    --panel:rgba(16,28,54,.62);
    --line:rgba(255,255,255,.14);
    --gold:#f4c430;
    --live:#ef2b4d;
    --ink:#eef1fb;
    --ink-dim:#9aa6c8;
    --display:'Oswald',system-ui,sans-serif;
    --mono:ui-monospace,"SFMono-Regular",Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:transparent;font-family:var(--display);}
  body{display:flex;align-items:center;justify-content:center;}

  .player{width:670px;height:360px;border-radius:22px;overflow:hidden;position:relative;
    background:var(--navy);box-shadow:0 14px 34px rgba(0,0,0,.32);user-select:none;}

  video.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(1.12) saturate(1.1) contrast(1.02);}
  .overlay-grad{position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(6,10,20,.32) 0%, rgba(6,10,20,.03) 30%, rgba(6,10,20,.06) 55%, rgba(6,10,20,.34) 100%);}

  .ui{position:absolute;inset:0;display:flex;flex-direction:column;gap:12px;padding:20px 26px;z-index:3;}

  .topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:flex-start;gap:16px;}

  .search-wrap{position:relative;flex:0 0 auto;width:198px;margin-left:188px;}
  .search-wrap .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.78rem;opacity:.65;pointer-events:none;}
  #searchInput{width:100%;background:rgba(6,12,26,.55);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:9px 32px 9px 30px;font-size:.82rem;font-family:var(--display);outline:none;}
  #searchInput::placeholder{color:var(--ink-dim);}
  #searchInput:focus{border-color:var(--gold);}
  .clear-search{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;
    color:var(--ink-dim);cursor:pointer;font-size:.85rem;padding:2px 4px;}
  .clear-search:hover{color:var(--ink);}

  .scoreboard{flex:0 0 auto;align-self:flex-start;width:372px;max-width:372px;height:158px;min-height:158px;max-height:158px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;
    background:var(--panel);backdrop-filter:blur(9px);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 16px 36px rgba(0,0,0,.4);cursor:pointer;padding:16px 18px;}

  .corner-badge{position:absolute;top:-11px;left:22px;z-index:4;font-weight:700;font-size:.54rem;
    letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:99px;display:flex;align-items:center;gap:4px;}
  .corner-badge.live{color:#fff;background:var(--live);box-shadow:0 5px 12px rgba(239,43,77,.4);}
  .corner-badge.upcoming{background:rgba(20,32,60,.92);border:1px solid rgba(244,196,48,.55);color:var(--gold);box-shadow:0 5px 12px rgba(0,0,0,.35);}
  .corner-badge.ft{background:rgba(20,32,60,.92);border:1px solid var(--line);color:var(--ink-dim);box-shadow:0 5px 12px rgba(0,0,0,.35);}
  .corner-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.1s infinite;}

  .stage-label{font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:14px;text-align:center;line-height:1.3;}

  .sb-content{transition:opacity .22s ease;display:flex;flex-direction:column;align-items:center;}
  .sb-content.fade{opacity:0;}

  .teams{display:flex;align-items:center;justify-content:center;gap:22px;}
  .team{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .flag{width:52px;height:36px;object-fit:cover;border-radius:6px;border:1px solid rgba(255,255,255,.3);box-shadow:0 3px 10px rgba(0,0,0,.45);display:block;}
  .flag-fallback{width:52px;height:36px;border-radius:6px;border:1px solid rgba(244,196,48,.5);background:rgba(0,0,0,.4);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.58rem;color:var(--gold);}
  .code{font-weight:700;font-size:.92rem;letter-spacing:.03em;color:var(--ink);}

  .score-box{font-family:var(--mono);font-weight:700;font-size:1.65rem;color:var(--gold);letter-spacing:.04em;
    background:#000;border-radius:10px;padding:6px 16px;display:flex;gap:8px;min-width:96px;justify-content:center;
    box-shadow:inset 0 0 0 1px rgba(244,196,48,.25);}
  .score-box .sep{color:var(--ink-dim);}

  .detail-pill{margin-top:14px;font-family:var(--mono);font-size:.76rem;letter-spacing:.03em;color:var(--gold);
    border:1px solid rgba(244,196,48,.5);background:rgba(244,196,48,.08);border-radius:99px;padding:6px 16px;}

  .state-msg{font-family:var(--mono);font-size:.85rem;color:var(--ink-dim);text-align:center;line-height:1.6;}
  .state-dots{display:inline-flex;gap:5px;margin-bottom:10px;}
  .state-dots span{width:7px;height:7px;border-radius:50%;background:var(--gold);display:inline-block;animation:dotpulse 1.1s ease-in-out infinite;}
  .state-dots span:nth-child(2){animation-delay:.15s;}
  .state-dots span:nth-child(3){animation-delay:.3s;}
  @keyframes dotpulse{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
  @keyframes blink{50%{opacity:.3;}}

  .goal-popup{position:absolute;top:8px;right:10px;z-index:6;display:flex;align-items:center;gap:7px;
    padding:5px 12px 5px 8px;border-radius:99px;background:rgba(10,16,32,.78);border:1px solid rgba(244,196,48,.6);
    box-shadow:0 8px 18px rgba(0,0,0,.45);opacity:0;pointer-events:none;transform:translateY(-6px) scale(.9);
    transition:opacity .25s ease,transform .25s ease;}
  .goal-popup.show{opacity:1;transform:translateY(0) scale(1);}
  .goal-ball{flex:0 0 auto;animation:goalSpin 0.85s linear infinite;}
  .goal-popup.show .goal-ball{animation-play-state:running;}
  .goal-text{font-weight:700;font-size:.78rem;letter-spacing:.05em;color:var(--gold);text-shadow:0 0 8px rgba(244,196,48,.5);}
  @keyframes goalSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

  .dots{flex:0 0 auto;align-self:flex-start;width:372px;display:none;justify-content:center;gap:7px;}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;transition:all .2s;}
  .dot.active{background:var(--gold);width:18px;border-radius:4px;}

  .radio{flex:0 0 auto;align-self:flex-start;width:470px;max-width:470px;background:rgba(10,18,38,.62);backdrop-filter:blur(9px);border:1.5px solid rgba(244,196,48,.55);
    border-radius:14px;padding:11px 18px;}
  .radio-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .radio-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:blink 1.1s infinite;flex:0 0 auto;}
  .radio-name{font-weight:700;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;color:var(--ink);flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .radio-menu{color:var(--ink-dim);font-size:1rem;letter-spacing:1px;}
  .radio-controls{display:flex;align-items:center;gap:14px;}
  .radio-btn{width:38px;height:38px;border-radius:50%;flex:0 0 auto;
    background:radial-gradient(circle at 35% 30%, #ffe9a8, var(--gold) 60%, #c89421 100%);
    border:none;color:#16223f;font-size:.85rem;display:flex;align-items:center;justify-content:center;cursor:pointer;
    box-shadow:0 4px 12px rgba(0,0,0,.4);}
  .radio-btn:hover{filter:brightness(1.08);}
  .speaker-btn{width:32px;height:32px;border-radius:50%;flex:0 0 auto;background:rgba(255,255,255,.08);border:1px solid var(--line);
    color:var(--ink);font-size:.78rem;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  input[type=range]{flex:1;height:5px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:99px;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--gold);
    cursor:pointer;border:2px solid var(--navy);box-shadow:0 2px 6px rgba(0,0,0,.4);}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--navy);}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  .context-disclaimer{position:fixed;z-index:50;max-width:260px;padding:11px 15px;border-radius:10px;
    background:rgba(8,14,28,.96);border:1px solid rgba(244,196,48,.45);box-shadow:0 14px 30px rgba(0,0,0,.5);
    color:var(--ink);font-family:var(--display);font-size:.74rem;line-height:1.45;letter-spacing:.01em;
    opacity:0;pointer-events:none;transform:translateY(4px);transition:opacity .15s ease,transform .15s ease;}
  .context-disclaimer.show{opacity:1;transform:translateY(0);}
  .context-disclaimer b{color:var(--gold);}
</style>
</head>
<body>

<div class="player" id="player">
  <video class="bg" autoplay muted loop playsinline preload="auto" src="https://i.imgur.com/GSWOT7J.mp4"></video>
  <div class="overlay-grad"></div>

  <div class="ui">
    <div class="topbar">
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar selección…" autocomplete="off">
        <button class="clear-search" id="clearSearch" type="button" hidden>✕</button>
      </div>
    </div>

    <div class="scoreboard" id="scoreboard">
      <div class="sb-content" id="sbContent">
        <div class="state-msg"><span class="state-dots"><span></span><span></span><span></span></span><br>Cargando partidos…</div>
      </div>
      <div class="goal-popup" id="goalPopup">
        <svg class="goal-ball" viewBox="0 0 100 100" width="46" height="46">
          <circle cx="50" cy="50" r="47" fill="#fff" stroke="#16223f" stroke-width="3"/>
          <polygon points="50,28 65,39 60,57 40,57 35,39" fill="#16223f"/>
          <polygon points="50,28 35,39 38,33 50,22" fill="#16223f" opacity="0"/>
          <path d="M50 3a47 47 0 0 1 33.2 13.8L74 26a35 35 0 0 0-24-9z" fill="#16223f"/>
          <path d="M3 50a47 47 0 0 1 13.8-33.2L26 26a35 35 0 0 0-9 24z" fill="#16223f"/>
          <path d="M97 50a47 47 0 0 1-13.8 33.2L74 74a35 35 0 0 0 9-24z" fill="#16223f"/>
          <path d="M50 97a47 47 0 0 1-33.2-13.8L26 74a35 35 0 0 0 24 9z" fill="#16223f"/>
        </svg>
        <span class="goal-text">¡GOL!</span>
      </div>
    </div>
    <div class="dots" id="dots"></div>

    <div class="radio">
      <div class="radio-top">
        <span class="radio-dot"></span>
        <span class="radio-name" id="radioName">RADIO EN VIVO</span>
        <span class="radio-menu">⋯</span>
      </div>
      <div class="radio-controls">
        <button class="radio-btn" id="radioToggle" type="button" aria-label="Reproducir radio">▶</button>
        <input type="range" id="volume" min="0" max="100" value="70" aria-label="Volumen">
        <button class="speaker-btn" id="muteBtn" type="button" aria-label="Silenciar">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor" stroke="none"/>
            <path d="M16 8a5 5 0 0 1 0 8"/>
            <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <audio id="radioAudio" preload="none" src="https://technoplayerserver.net/8096/stream"></audio>
  <audio id="goalAudio" preload="auto" src="https://github.com/eamxat/ReproductorMundial/raw/refs/heads/main/goal.mp3"></audio>

  <div class="context-disclaimer" id="contextDisclaimer">Reproductor creado exclusivamente para <b>Xat 2000's</b>. ©2026 Eam96 Design</div>
</div>

<script>
(function(){
  "use strict";

  const API_BASE = "https://api.fifa.com/api/v3";
  const ID_SEASON = "285023";
  const LANG = "es";
  const ROTATE_MS = 5000;

  const FIFA_TO_ISO2 = {
    MEX:"mx", RSA:"za", KOR:"kr", CZE:"cz", CAN:"ca", BIH:"ba", USA:"us", PAR:"py",
    QAT:"qa", SUI:"ch", BRA:"br", MAR:"ma", HAI:"ht", SCO:"gb-sct", AUS:"au", TUR:"tr",
    GER:"de", CUW:"cw", NED:"nl", JPN:"jp", CIV:"ci", ECU:"ec", SWE:"se", TUN:"tn",
    ESP:"es", CPV:"cv", BEL:"be", EGY:"eg", KSA:"sa", URU:"uy", IRN:"ir", NZL:"nz",
    FRA:"fr", SEN:"sn", IRQ:"iq", NOR:"no", ARG:"ar", ALG:"dz", AUT:"at", JOR:"jo",
    POR:"pt", COD:"cd", ENG:"gb-eng", CRO:"hr", GHA:"gh", PAN:"pa", UZB:"uz", COL:"co"
  };

  window.__flagFallback = function(imgEl){
    const code = imgEl.dataset.code || "??";
    const div = document.createElement("div");
    div.className = "flag-fallback";
    div.textContent = code;
    imgEl.replaceWith(div);
  };

  const searchInput = document.getElementById("searchInput");
  const clearSearchBtn = document.getElementById("clearSearch");
  const scoreboardEl = document.getElementById("scoreboard");
  const sbContent = document.getElementById("sbContent");
  const dotsEl = document.getElementById("dots");
  const radioAudio = document.getElementById("radioAudio");
  const radioToggle = document.getElementById("radioToggle");
  const volumeSlider = document.getElementById("volume");
  const muteBtn = document.getElementById("muteBtn");
  const radioNameEl = document.getElementById("radioName");
  const goalAudio = document.getElementById("goalAudio");
  const goalPopup = document.getElementById("goalPopup");
  const contextDisclaimer = document.getElementById("contextDisclaimer");
  const playerEl = document.getElementById("player");

  let allMatches = [];
  let currentList = [];
  let idx = 0;
  let mode = "live";
  let intervalId = null;
  let isFirstLoad = true;

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function loc(arr){ return (Array.isArray(arr) && arr[0] && arr[0].Description) || ""; }
  function pickAbbr(team){
    if(!team) return "???";
    return team.Abbreviation || team.ShortClubName || (loc(team.TeamName).slice(0,3).toUpperCase()) || "???";
  }
  function pickName(team, fallback){
    if(!team) return fallback || "Por definir";
    return loc(team.TeamName) || fallback || "Por definir";
  }
  function normalizeStr(s){
    return String(s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
  }
  function flagImg(code){
    const iso = FIFA_TO_ISO2[code];
    if(!iso) return `<div class="flag-fallback">${escapeHtml(code)}</div>`;
    return `<img class="flag" data-code="${escapeHtml(code)}" alt="${escapeHtml(code)}" onerror="window.__flagFallback(this)" src="https://flagcdn.com/w160/${iso}.png">`;
  }
  function fmtDatePill(dateStr){
    const d = new Date(dateStr);
    if(isNaN(d)) return "";
    const day = String(d.getDate()).padStart(2,"0");
    const months = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    return `${day} ${months[d.getMonth()]}, ${hh}:${mm}`;
  }
  function fmtShortDate(dateStr){
    const d = new Date(dateStr);
    if(isNaN(d)) return "";
    const day = String(d.getDate()).padStart(2,"0");
    const months = ["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"];
    return `${day} ${months[d.getMonth()]}`;
  }

  function normalize(r){
    const home = r.Home || r.HomeTeam || null;
    const away = r.Away || r.AwayTeam || null;
    const homeCode = pickAbbr(home);
    const awayCode = pickAbbr(away);
    return {
      id: r.IdMatch,
      date: r.Date || r.LocalDate || r.MatchDate || null,
      status: typeof r.MatchStatus === "number" ? r.MatchStatus : 1,
      minute: r.MatchTime || "",
      homeScore: (r.HomeTeamScore ?? (home && home.Score)) ?? null,
      awayScore: (r.AwayTeamScore ?? (away && away.Score)) ?? null,
      homeCode, awayCode,
      homeName: pickName(home, homeCode),
      awayName: pickName(away, awayCode),
      stage: loc(r.StageName) || loc(r.Stage),
      group: loc(r.GroupName) || loc(r.Group),
    };
  }

  async function loadCalendar(){
    try{
      const url = `${API_BASE}/calendar/matches?language=${LANG}&count=500&idSeason=${ID_SEASON}`;
      const res = await fetch(url, { cache: "no-store" });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const results = data.Results || data.results || [];
      if(!Array.isArray(results) || !results.length) throw new Error("Sin partidos en la respuesta");
      allMatches = results.map(normalize);
      if(isFirstLoad){ primeScoreMemory(allMatches); isFirstLoad = false; }
      else checkForGoals(allMatches);
      const q = searchInput.value.trim();
      if(mode === "search" && q) setSearchMode(q);
      else setLiveMode();
    }catch(err){
      console.error("Reproductor Mundial 2026:", err);
      if(!allMatches.length){
        sbContent.innerHTML = '<div class="state-msg">No se pudo cargar la información.<br>Reintentando…</div>';
      }
    }
  }

  async function pollLiveNow(){
    try{
      const url = `${API_BASE}/live/football/now?language=${LANG}`;
      const res = await fetch(url, { cache: "no-store" });
      if(!res.ok) return;
      const data = await res.json();
      let changed = false;
      const touched = [];
      for(const r of (data.Results || [])){
        if(String(r.IdSeason) !== String(ID_SEASON)) continue;
        const m = allMatches.find(x => x.id === r.IdMatch);
        if(m){
          m.status = 3;
          m.homeScore = (r.HomeTeam && r.HomeTeam.Score) ?? m.homeScore;
          m.awayScore = (r.AwayTeam && r.AwayTeam.Score) ?? m.awayScore;
          m.minute = r.MatchTime || m.minute;
          changed = true;
          touched.push(m);
        }
      }
      if(touched.length) checkForGoals(touched);
      if(changed){
        if(mode === "live") setLiveMode();
        else if(mode === "search" && searchInput.value.trim()) setSearchMode(searchInput.value.trim());
      }
    }catch(e){ /* fallo silencioso */ }
  }

  function liveOrFallbackList(){
    const live = allMatches.filter(m => m.status === 3).sort((a,b) => new Date(a.date) - new Date(b.date));
    if(live.length) return live;
    const upcoming = allMatches.filter(m => m.status === 1 && m.date).sort((a,b) => new Date(a.date) - new Date(b.date));
    if(upcoming.length) return [upcoming[0]];
    const finished = allMatches.filter(m => m.status === 0).sort((a,b) => new Date(b.date) - new Date(a.date));
    if(finished.length) return [finished[0]];
    return [];
  }

  function setLiveMode(){
    mode = "live";
    searchInput.value = "";
    clearSearchBtn.hidden = true;
    currentList = liveOrFallbackList();
    afterListChange(true);
  }

  function setSearchMode(query){
    mode = "search";
    const norm = normalizeStr(query);
    const rankOf = s => s === 3 ? 0 : (s === 1 ? 1 : 2);
    const results = allMatches.filter(m => {
      return normalizeStr(m.homeName).includes(norm) || normalizeStr(m.awayName).includes(norm) ||
             normalizeStr(m.homeCode).includes(norm) || normalizeStr(m.awayCode).includes(norm);
    }).sort((a,b) => {
      const ra = rankOf(a.status), rb = rankOf(b.status);
      if(ra !== rb) return ra - rb;
      if(a.status === 0) return new Date(b.date) - new Date(a.date);
      return new Date(a.date) - new Date(b.date);
    });
    currentList = results;
    afterListChange(true, results.length === 0 ? `Sin partidos para "${query}".` : null);
  }

  function cornerBadgeHTML(m){
    if(m.status === 3) return `<span class="corner-badge live"><span class="corner-dot"></span>LIVE</span>`;
    if(m.status === 0) return `<span class="corner-badge ft">FINAL</span>`;
    return `<span class="corner-badge upcoming">PRÓXIMO</span>`;
  }
  function scoreHTML(m){
    if(m.status === 1) return `<div class="score-box">–<span class="sep">:</span>–</div>`;
    return `<div class="score-box">${m.homeScore ?? "–"}<span class="sep">:</span>${m.awayScore ?? "–"}</div>`;
  }
  function detailPillHTML(m){
    if(m.status === 3) return `<span class="detail-pill">${escapeHtml(m.minute || "EN VIVO")}</span>`;
    if(m.status === 0) return `<span class="detail-pill">${escapeHtml(m.date ? fmtShortDate(m.date) : "FINAL")}</span>`;
    return `<span class="detail-pill">${escapeHtml(m.date ? fmtDatePill(m.date) : "")}</span>`;
  }

  function matchHTML(m){
    const stageLabel = [m.stage, m.group].filter(Boolean).join(" • ") || "Copa Mundial 2026";
    return `
      ${cornerBadgeHTML(m)}
      <div class="stage-label">${escapeHtml(stageLabel)}</div>
      <div class="teams">
        <div class="team">${flagImg(m.homeCode)}<span class="code">${escapeHtml(m.homeCode)}</span></div>
        ${scoreHTML(m)}
        <div class="team">${flagImg(m.awayCode)}<span class="code">${escapeHtml(m.awayCode)}</span></div>
      </div>
      ${detailPillHTML(m)}
    `;
  }

  function renderMatch(i, animate){
    if(!currentList.length) return;
    const html = matchHTML(currentList[i]);
    if(animate === false){
      sbContent.innerHTML = html;
    }else{
      sbContent.classList.add("fade");
      setTimeout(() => {
        sbContent.innerHTML = html;
        sbContent.classList.remove("fade");
      }, 220);
    }
  }

  function renderDots(){
    if(currentList.length < 2){ dotsEl.style.display = "none"; dotsEl.innerHTML = ""; return; }
    dotsEl.style.display = "flex";
    dotsEl.innerHTML = currentList.map((_, i) => `<span class="dot" data-i="${i}"></span>`).join("");
    dotsEl.querySelectorAll(".dot").forEach(d => {
      d.addEventListener("click", (e) => { e.stopPropagation(); goTo(parseInt(d.dataset.i, 10)); });
    });
  }
  function updateDots(){
    dotsEl.querySelectorAll(".dot").forEach((d, j) => d.classList.toggle("active", j === idx));
  }

  function afterListChange(resetIdx, emptyMessage){
    if(resetIdx) idx = 0;
    renderDots();
    if(emptyMessage){
      sbContent.innerHTML = `<div class="state-msg">${escapeHtml(emptyMessage)}</div>`;
    } else if(!currentList.length){
      sbContent.innerHTML = '<div class="state-msg">Sin partidos disponibles por ahora.</div>';
    } else {
      renderMatch(idx, false);
    }
    updateDots();
    restartInterval();
  }

  function goNext(){
    if(currentList.length < 2) return;
    idx = (idx + 1) % currentList.length;
    renderMatch(idx, true);
    updateDots();
  }
  function goTo(i){
    if(!currentList.length) return;
    idx = i;
    renderMatch(idx, true);
    updateDots();
    restartInterval();
  }
  function restartInterval(){
    clearInterval(intervalId);
    if(mode === "live" && currentList.length > 1){
      intervalId = setInterval(goNext, ROTATE_MS);
    }
  }

  function bindEvents(){
    let debounceId = null;
    function runSearch(){
      const q = searchInput.value.trim();
      clearSearchBtn.hidden = !q;
      if(!q) setLiveMode(); else setSearchMode(q);
    }
    searchInput.addEventListener("input", () => {
      clearTimeout(debounceId);
      clearSearchBtn.hidden = !searchInput.value.trim();
      debounceId = setTimeout(runSearch, 280);
    });
    searchInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){ clearTimeout(debounceId); runSearch(); }
    });
    clearSearchBtn.addEventListener("click", () => {
      searchInput.value = "";
      clearSearchBtn.hidden = true;
      setLiveMode();
      searchInput.focus();
    });
    scoreboardEl.addEventListener("click", () => {
      if(currentList.length > 1) goTo((idx + 1) % currentList.length);
    });

    radioToggle.addEventListener("click", () => {
      if(radioAudio.paused){ radioAudio.play().catch(e => console.warn("Radio:", e)); }
      else { radioAudio.pause(); }
    });
    radioAudio.addEventListener("play", () => { radioToggle.textContent = "❚❚"; });
    radioAudio.addEventListener("pause", () => { radioToggle.textContent = "▶"; });
    radioAudio.addEventListener("waiting", () => { radioNameEl.textContent = "Conectando…"; });
    radioAudio.addEventListener("playing", () => { radioNameEl.textContent = "RADIO EN VIVO"; });
    radioAudio.addEventListener("error", () => { radioNameEl.textContent = "Radio no disponible"; });

    volumeSlider.addEventListener("input", () => {
      radioAudio.volume = volumeSlider.value / 100;
      if(radioAudio.muted && radioAudio.volume > 0) radioAudio.muted = false;
      updateMuteIcon();
    });
    muteBtn.addEventListener("click", () => {
      radioAudio.muted = !radioAudio.muted;
      updateMuteIcon();
    });

    let disclaimerHideTimer = null;
    document.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      const vw = document.documentElement.clientWidth;
      const vh = document.documentElement.clientHeight;
      let x = e.clientX, y = e.clientY;
      const maxX = vw - 270;
      const maxY = vh - 70;
      if(x > maxX) x = maxX;
      if(y > maxY) y = maxY;
      if(x < 4) x = 4;
      if(y < 4) y = 4;
      contextDisclaimer.style.left = x + "px";
      contextDisclaimer.style.top = y + "px";
      contextDisclaimer.classList.add("show");
      clearTimeout(disclaimerHideTimer);
      disclaimerHideTimer = setTimeout(() => contextDisclaimer.classList.remove("show"), 4000);
    });
    document.addEventListener("click", () => { contextDisclaimer.classList.remove("show"); });
    document.addEventListener("scroll", () => { contextDisclaimer.classList.remove("show"); }, true);

    document.addEventListener("keydown", (e) => {
      const k = e.key;
      const blockCombo =
        k === "F12" ||
        (e.ctrlKey && e.shiftKey && (k === "I" || k === "i" || k === "J" || k === "j" || k === "C" || k === "c")) ||
        (e.ctrlKey && (k === "U" || k === "u")) ||
        (e.metaKey && e.altKey && (k === "I" || k === "i" || k === "J" || k === "j" || k === "C" || k === "c"));
      if(blockCombo) e.preventDefault();
    });
  }
  const ICON_UNMUTED = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor" stroke="none"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg>';
  const ICON_MUTED = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor" stroke="none"/><line x1="16" y1="9" x2="21" y2="14"/><line x1="21" y1="9" x2="16" y2="14"/></svg>';
  function updateMuteIcon(){
    muteBtn.innerHTML = (radioAudio.muted || radioAudio.volume === 0) ? ICON_MUTED : ICON_UNMUTED;
  }

  let goalPopupTimer = null;
  function triggerGoal(){
    goalAudio.currentTime = 0;
    goalAudio.play().catch(e => console.warn("Gol audio:", e));
    goalPopup.classList.add("show");
    clearTimeout(goalPopupTimer);
    goalPopupTimer = setTimeout(() => { goalPopup.classList.remove("show"); }, 3200);
  }

  // Recuerda el último marcador visto por partido para detectar nuevos goles.
  const lastScores = new Map();
  function primeScoreMemory(list){
    for(const m of list){
      lastScores.set(m.id, { h: m.homeScore, a: m.awayScore });
    }
  }
  function checkForGoals(list){
    for(const m of list){
      if(m.status !== 3) continue; // solo partidos en vivo
      const prev = lastScores.get(m.id);
      const curr = { h: m.homeScore, a: m.awayScore };
      if(prev && (curr.h !== prev.h || curr.a !== prev.a)){
        const prevTotal = (Number(prev.h) || 0) + (Number(prev.a) || 0);
        const currTotal = (Number(curr.h) || 0) + (Number(curr.a) || 0);
        if(currTotal > prevTotal) triggerGoal();
      }
      lastScores.set(m.id, curr);
    }
  }

  function init(){
    radioAudio.volume = 0.7;
    goalAudio.volume = 0.35;
    updateMuteIcon();
    bindEvents();
    loadCalendar();
    setInterval(loadCalendar, 60000);
    setInterval(() => { if(allMatches.some(m => m.status === 3)) pollLiveNow(); }, 20000);
  }

  init();
})();
</script>
</body>
</html>
